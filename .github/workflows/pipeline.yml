name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    env:
      PYTHONPATH: .

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Lint (ruff)
        run: ruff check src/ tests/ main.py

      - name: Run data generation (dry-run, 1000 rows)
        run: |
          python -c "
          import yaml, sys
          cfg = yaml.safe_load(open('config/config.yaml'))
          cfg['generator']['n_work_orders'] = 1000
          cfg['generator']['n_telemetry_hours'] = 500
          cfg['generator']['n_inspections'] = 500
          import yaml; yaml.dump(cfg, open('/tmp/config_ci.yaml','w'))
          "
          python -c "
          from src.ingestion.generator import run
          run(config_path='/tmp/config_ci.yaml', out_dir='/tmp/raw_ci')
          "

      - name: Run tests (no DB, no model training integration)
        run: |
          pytest tests/test_generator.py tests/test_validation.py tests/test_features.py -v
        env:
          PYTHONPATH: .

      - name: Run model tests (unit, small dataset)
        run: |
          pytest tests/test_models.py -v
        env:
          PYTHONPATH: .
